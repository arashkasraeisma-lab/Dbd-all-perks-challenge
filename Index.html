<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DbD Survivor Perk Streak</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #dcdcdc;
            font-family: 'Courier New', Courier, monospace; /* Stile un po' più horror */
            text-align: center;
            padding: 10px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            border: 2px solid #444;
            padding: 15px;
            background-color: #121212;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(138, 3, 3, 0.5);
        }
        h1 { color: #b30000; text-transform: uppercase; font-size: 1.5em; margin-bottom: 10px; }
        
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .stat-box { 
            background: #1e1e1e; 
            padding: 8px; 
            border-radius: 4px; 
            border-bottom: 2px solid #b30000;
            flex: 1;
            margin: 0 5px;
            font-size: 0.9em;
        }
        .stat-box span { display: block; font-weight: bold; font-size: 1.2em; color: #fff; }

        .perks-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }
        .perk-card {
            background: #222;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #333;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ff9d00; /* Colore perk leggendari/rari */
            font-size: 0.85em;
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 5px 0;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-gen { background-color: #b30000; color: white; }
        .btn-win { background-color: #2e7d32; color: white; }
        .btn-loss { background-color: #c62828; color: white; opacity: 0.8; }
        button:disabled { background-color: #333; color: #666; cursor: not-allowed; }

        .checkpoint-msg { color: #888; font-size: 0.8em; margin: 10px 0; }
        .reset-link { color: #555; text-decoration: underline; font-size: 0.7em; cursor: pointer; margin-top: 20px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>Survivor Streak Challenge</h1>
    
    <div class="stats">
        <div class="stat-box">Streak <span><id id="streak">0</id></span></div>
        <div class="stat-box">Checkpoint <span><id id="checkpoint">0</id></span></div>
        <div class="stat-box">Rimanenti <span><id id="remaining">0</id></span></div>
    </div>

    <div class="perks-display" id="perk-display">
        <div class="perk-card">?</div>
        <div class="perk-card">?</div>
        <div class="perk-card">?</div>
        <div class="perk-card">?</div>
    </div>

    <button class="btn-gen" id="btn-generate" onclick="generatePerks()">Genera Perk Partita</button>
    <button class="btn-win" id="btn-win" onclick="handleWin()" disabled>Vittoria</button>
    <button class="btn-loss" id="btn-loss" onclick="handleLoss()">Sconfitta</button>

    <p class="checkpoint-msg">Checkpoint automatici a 10, 20, 30 vittorie.</p>
    
    <span class="reset-link" onclick="fullReset()">Reset totale della sfida</span>
</div>

<script>
    const allPerks = [
        "Ace in the Hole", "Adrenaline", "Aftercare", "Alert", "Any Means Necessary", 
        "Appraisal", "Autodidact", "Babysitter", "Balanced Landing", "Bardic Inspiration", 
        "Beacon of Hope", "Better Together", "Better than New", "Bite the Bullet", 
        "Blast Mine", "Blood Pact", "Blood Rush", "Boil Over", "Bond", "Boon: Circle of Healing", 
        "Boon: Dark Theory", "Boon: Exponential", "Boon: Illumination", "Boon: Shadow Step", 
        "Borrowed Time", "Botany Knowledge", "Breakdown", "Breakout", "Buckle Up", 
        "Built to Last", "Calm Spirit", "Champion of Light", "Checkmate", "Chemical Trap", 
        "Clairvoyance", "Corrective Action", "Counterforce", "Cut Loose", "Dark Sense", 
        "Dead Hard", "Deception", "Decisive Strike", "Deliverance", "Desperate Measures", 
        "Detective's Hunch", "Distortion", "Diversion", "Deja Vu", "Dramaturgy", 
        "Empathy", "Fast Track", "Deadline", "Empowerment", "Inner Strength", 
        "Fixated", "Flashbang", "Flip-Flop", "Fogwise", "For the People", "Friendly Competition", 
        "Guardian", "Hardened", "Head On", "Hope", "Hyperfocus", "Inner Focus", 
        "Invocation: Weaving Spiders", "Iron Will", "Kindred", "Leader", "Left Behind", 
        "Lightweight", "Lithe", "Low Profile", "Lucky Break", "Lucky Star", "Made for This", 
        "Mettle of Man", "Mirrored Illusion", "No Mither", "No One Left Behind", 
        "Object of Obsession", "Off the Record", "Open-Handed", "Overcome", "Overzealous", 
        "Parental Guidance", "Partnership", "Pharmacy", "Plunderer's Instinct", 
        "Poised", "Potential Energy", "Power Struggle", "Premonition", "Projector", 
        "Prove Thyself", "Quick & Quiet", "Quick Gambit", "Reactive Healing", 
        "Reassurance", "Red Herring", "Renewal", "Repressed Alliance", "Residual Manifest", 
        "Resilience", "Rookie Spirit", "Saboteur", "Scavenger", "Scene Partner", 
        "Self-Care", "Self-Preservation", "Slippery Meat", "Small Game", "Smash Hit", 
        "Sole Survivor", "Solidarity", "Soul Guard", "Spine Chill", "Spirit Burst", 
        "Stake Out", "Static Cling", "Streetwise", "Strength in Shadows", "Stunner", 
        "Swick Attack", "Tactician", "Technician", "Tenacity", "This Is Not Happening", 
        "Troubleshooter", "Up the Ante", "Urban Evasion", "Unbreakable", "Vigil", 
        "Visionary", "Wake Up!", "We're Gonna Live Forever", "Wicked", "Windows of Opportunity", 
        "Wiretap", "Witness", "We'll Make It", "You're Next"
    ];

    let availablePerks = [...allPerks];
    let currentPerks = [];
    let streak = 0;
    let checkpoint = 0;

    // Caricamento dati
    const savedData = JSON.parse(localStorage.getItem('dbd_streak_save'));
    if (savedData) {
        streak = savedData.streak;
        checkpoint = savedData.checkpoint;
        availablePerks = savedData.availablePerks;
    }

    function updateUI() {
        document.getElementById('streak').innerText = streak;
        document.getElementById('checkpoint').innerText = checkpoint;
        document.getElementById('remaining').innerText = availablePerks.length;
        
        // Salvataggio nel browser
        localStorage.setItem('dbd_streak_save', JSON.stringify({
            streak, checkpoint, availablePerks
        }));
    }

    function generatePerks() {
        if (availablePerks.length < 4) {
            alert("Hai finito i perk! Sfida completata o resetta per ricominciare.");
            return;
        }

        currentPerks = [];
        let tempPool = [...availablePerks];
        for (let i = 0; i < 4; i++) {
            const idx = Math.floor(Math.random() * tempPool.length);
            currentPerks.push(tempPool.splice(idx, 1)[0]);
        }

        const display = document.getElementById('perk-display');
        display.innerHTML = '';
        currentPerks.forEach(p => {
            display.innerHTML += `<div class="perk-card">${p}</div>`;
        });

        document.getElementById('btn-win').disabled = false;
        document.getElementById('btn-generate').disabled = true;
    }

    function handleWin() {
        // Rimuove perk usati
        availablePerks = availablePerks.filter(p => !currentPerks.includes(p));
        streak++;

        // Logica Checkpoint
        if (streak >= 30) checkpoint = 30;
        else if (streak >= 20) checkpoint = 20;
        else if (streak >= 10) checkpoint = 10;

        resetRound();
        updateUI();
    }

    function handleLoss() {
        if (confirm("Partita persa. La streak tornerà al checkpoint " + checkpoint + ". Confermi?")) {
            streak = checkpoint;
            resetRound();
            updateUI();
        }
    }

    function resetRound() {
        currentPerks = [];
        document.getElementById('perk-display').innerHTML = `
            <div class="perk-card">?</div><div class="perk-card">?</div>
            <div class="perk-card">?</div><div class="perk-card">?</div>`;
        document.getElementById('btn-win').disabled = true;
        document.getElementById('btn-generate').disabled = false;
    }

    function fullReset() {
        if (confirm("ATTENZIONE: Questo cancellerà tutti i progressi e i perk usati. Vuoi ricominciare da zero?")) {
            localStorage.removeItem('dbd_streak_save');
            location.reload();
        }
    }

    // Inizializza UI
    updateUI();
</script>

</body>
</html>
