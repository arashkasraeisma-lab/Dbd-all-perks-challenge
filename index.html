<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DbD Ultimate Perk Streak</title>
    <style>
        body { background-color: #0a0a0a; color: #dcdcdc; font-family: 'Courier New', Courier, monospace; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: 20px auto; border: 2px solid #444; padding: 20px; background-color: #121212; border-radius: 8px; box-shadow: 0 0 20px rgba(138, 3, 3, 0.5); }
        h1 { color: #b30000; text-transform: uppercase; font-size: 1.4em; margin-bottom: 20px; letter-spacing: 2px; }
        
        .stats { display: flex; justify-content: space-around; margin-bottom: 25px; gap: 10px; }
        .stat-box { background: #1e1e1e; padding: 10px; border-radius: 4px; border-bottom: 3px solid #b30000; flex: 1; }
        .stat-box label { display: block; font-size: 0.7em; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-box span { display: block; font-weight: bold; font-size: 1.5em; color: #fff; }

        .perks-display { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 20px 0; }
        .perk-card { 
            background: #1a1a1a;
            padding: 15px; 
            border-radius: 4px; 
            border: 1px solid #333; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            min-height: 40px;
        }
        .perk-name { font-weight: bold; color: #ff9d00; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        .placeholder { color: #444; font-style: italic; }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-gen { background-color: #b30000; color: white; font-size: 1em; }
        .btn-win { background-color: #2e7d32; color: white; }
        .btn-loss { background-color: #333; color: #999; font-size: 0.8em; }
        button:disabled { background-color: #1a1a1a !important; color: #444 !important; cursor: not-allowed; border: 1px solid #222; }
        
        .reset-link { color: #444; text-decoration: underline; font-size: 0.7em; cursor: pointer; margin-top: 25px; display: inline-block; }
        .reset-link:hover { color: #b30000; }
    </style>
</head>
<body>

<div class="container">
    <h1>Perk Streak</h1>
    
    <div class="stats">
        <div class="stat-box"><label>Streak</label><span id="streak">0</span></div>
        <div class="stat-box"><label>Checkpoint</label><span id="checkpoint">0</span></div>
        <div class="stat-box"><label>Remaining</label><span id="remaining">0</span></div>
    </div>

    <div id="perk-display" class="perks-display">
        <div class="perk-card"><span class="placeholder">Ready to roll...</span></div>
    </div>

    <div class="controls">
        <button class="btn-gen" id="btn-generate" onclick="generatePerks()">Roll Perks</button>
        <button class="btn-win" id="btn-win" onclick="handleWin()" disabled>Confirm Win</button>
        <button class="btn-loss" id="btn-loss" onclick="handleLoss()">Loss (Back to Checkpoint)</button>
    </div>
    
    <span class="reset-link" onclick="fullReset()">Full Challenge Reset</span>
</div>

<script>
    const allPerks = ["Ace in the Hole", "Adrenaline", "Aftercare", "Alert", "Any Means Necessary", "Appraisal", "Autodidact", "Babysitter", "Balanced Landing", "Bardic Inspiration", "Beacon of Hope", "Better Together", "Better than New", "Bite the Bullet", "Blast Mine", "Blood Pact", "Blood Rush", "Boil Over", "Bond", "Boon: Circle of Healing", "Boon: Dark Theory", "Boon: Exponential", "Boon: Illumination", "Boon: Shadow Step", "Borrowed Time", "Botany Knowledge", "Breakdown", "Breakout", "Buckle Up", "Built to Last", "Calm Spirit", "Champion of Light", "Checkmate", "Chemical Trap", "Clairvoyance", "Corrective Action", "Counterforce", "Cut Loose", "Dark Sense", "Dead Hard", "Deception", "Decisive Strike", "Deliverance", "Desperate Measures", "Detective's Hunch", "Distortion", "Diversion", "Deja Vu", "Dramaturgy", "Empathy", "Fast Track", "Deadline", "Empowerment", "Inner Strength", "Fixated", "Flashbang", "Flip-Flop", "Fogwise", "For the People", "Friendly Competition", "Guardian", "Hardened", "Head On", "Hope", "Hyperfocus", "Inner Focus", "Invocation: Weaving Spiders", "Iron Will", "Kindred", "Leader", "Left Behind", "Lightweight", "Lithe", "Low Profile", "Lucky Break", "Lucky Star", "Made for This", "Mettle of Man", "Mirrored Illusion", "No Mither", "No One Left Behind", "Object of Obsession", "Off the Record", "Open-Handed", "Overcome", "Overzealous", "Parental Guidance", "Partnership", "Pharmacy", "Plunderer's Instinct", "Poised", "Potential Energy", "Power Struggle", "Premonition", "Projector", "Prove Thyself", "Quick & Quiet", "Quick Gambit", "Reactive Healing", "Reassurance", "Red Herring", "Renewal", "Repressed Alliance", "Residual Manifest", "Resilience", "Rookie Spirit", "Saboteur", "Scavenger", "Scene Partner", "Self-Care", "Self-Preservation", "Slippery Meat", "Small Game", "Smash Hit", "Sole Survivor", "Solidarity", "Soul Guard", "Spine Chill", "Sprint Burst", "Stake Out", "Static Cling", "Streetwise", "Strength in Shadows", "Stunner", "Swift Attack", "Tactician", "Technician", "Tenacity", "This Is Not Happening", "Troubleshooter", "Up the Ante", "Urban Evasion", "Unbreakable", "Vigil", "Visionary", "Wake Up!", "We're Gonna Live Forever", "Wicked", "Windows of Opportunity", "Wiretap", "Witness", "We'll Make It", "You're Next", "Eyes of Belmont", "Exultation", "Momentum", "Hardiness", "Finesse", "Specialist"];

    let availablePerks = [...allPerks];
    let usedPerksHistory = [];
    let currentPerks = [];
    let streak = 0;
    let checkpoint = 0;

    const savedData = JSON.parse(localStorage.getItem('dbd_streak_eng_clean'));
    if (savedData) {
        streak = savedData.streak || 0;
        checkpoint = savedData.checkpoint || 0;
        availablePerks = savedData.availablePerks || [...allPerks];
        usedPerksHistory = savedData.usedPerksHistory || [];
    }

    function updateUI() {
        document.getElementById('streak').innerText = streak;
        document.getElementById('checkpoint').innerText = checkpoint;
        document.getElementById('remaining').innerText = availablePerks.length;
        localStorage.setItem('dbd_streak_eng_clean', JSON.stringify({ streak, checkpoint, availablePerks, usedPerksHistory }));
    }

    function generatePerks() {
        if (availablePerks.length < 4) {
            alert("Not enough perks remaining!");
            return;
        }
        currentPerks = [];
        let tempPool = [...availablePerks];
        for (let i = 0; i < 4; i++) {
            const idx = Math.floor(Math.random() * tempPool.length);
            currentPerks.push(tempPool.splice(idx, 1)[0]);
        }
        
        const display = document.getElementById('perk-display');
        display.innerHTML = '';
        currentPerks.forEach(p => {
            display.innerHTML += `<div class="perk-card"><div class="perk-name">${p}</div></div>`;
        });
        
        document.getElementById('btn-win').disabled = false;
        document.getElementById('btn-generate').disabled = true;
    }

    function handleWin() {
        usedPerksHistory.push({ atStreak: streak + 1, perks: [...currentPerks] });
        availablePerks = availablePerks.filter(p => !currentPerks.includes(p));
        streak++;
        
        if (streak >= 24) checkpoint = 24;
        else if (streak >= 12) checkpoint = 12;
        
        resetRound();
        updateUI();
    }

    function handleLoss() {
        if (confirm("Resetting to checkpoint: " + checkpoint + "?")) {
            const toRestore = usedPerksHistory.filter(h => h.atStreak > checkpoint).flatMap(h => h.perks);
            availablePerks = [...new Set([...availablePerks, ...toRestore])];
            usedPerksHistory = usedPerksHistory.filter(h => h.atStreak <= checkpoint);
            
            streak = checkpoint;
            resetRound();
            updateUI();
        }
    }

    function resetRound() {
        document.getElementById('perk-display').innerHTML = '<div class="perk-card"><span class="placeholder">Ready to roll...</span></div>';
        document.getElementById('btn-win').disabled = true;
        document.getElementById('btn-generate').disabled = false;
    }

    function fullReset() {
        if (confirm("Are you sure? This will wipe all your progress!")) {
            localStorage.removeItem('dbd_streak_eng_clean');
            location.reload();
        }
    }

    updateUI();
</script>
</body>
</html>
