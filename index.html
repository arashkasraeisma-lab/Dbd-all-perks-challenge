<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DbD Ultimate Perk Streak</title>
    <style>
        body { background-color: #0a0a0a; color: #dcdcdc; font-family: 'Courier New', Courier, monospace; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 650px; margin: 20px auto; border: 2px solid #444; padding: 15px; background-color: #121212; border-radius: 8px; box-shadow: 0 0 20px rgba(138, 3, 3, 0.6); }
        h1 { color: #b30000; text-transform: uppercase; font-size: 1.5em; margin-bottom: 10px; text-shadow: 2px 2px #000; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .stat-box { background: #1e1e1e; padding: 8px; border-radius: 4px; border-bottom: 2px solid #b30000; flex: 1; margin: 0 5px; font-size: 0.8em; }
        .stat-box span { display: block; font-weight: bold; font-size: 1.3em; color: #fff; }
        .perks-display { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .perk-card { 
            background: linear-gradient(145deg, #222, #111);
            padding: 10px; border-radius: 8px; border: 1px solid #444; 
            min-height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .perk-card img { width: 100px; height: 100px; margin-bottom: 8px; filter: drop-shadow(0 0 5px #000); }
        .perk-name { font-weight: bold; color: #ff9d00; font-size: 0.75em; text-transform: uppercase; min-height: 2em; display: flex; align-items: center; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-gen { background-color: #b30000; color: white; }
        .btn-win { background-color: #2e7d32; color: white; }
        .btn-loss { background-color: #444; color: #ccc; font-size: 0.8em; }
        button:disabled { background-color: #333 !important; color: #666 !important; cursor: not-allowed; }
        .reset-link { color: #555; text-decoration: underline; font-size: 0.7em; cursor: pointer; margin-top: 20px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>Perk Streak Challenge</h1>
    <div class="stats">
        <div class="stat-box">Streak <span id="streak">0</span></div>
        <div class="stat-box">Checkpoint <span id="checkpoint">0</span></div>
        <div class="stat-box">Remaining <span id="remaining">0</span></div>
    </div>
    <div class="perks-display" id="perk-display">
        <div class="perk-card">?</div><div class="perk-card">?</div>
        <div class="perk-card">?</div><div class="perk-card">?</div>
    </div>
    <button class="btn-gen" id="btn-generate" onclick="generatePerks()">Roll Perks</button>
    <button class="btn-win" id="btn-win" onclick="handleWin()" disabled>Confirm Win</button>
    <button class="btn-loss" id="btn-loss" onclick="handleLoss()">Loss (Back to Checkpoint)</button>
    
    <span class="reset-link" onclick="fullReset()">Full Reset Challenge</span>
</div>

<script>
    const allPerks = [
        "Ace in the Hole", "Adrenaline", "Aftercare", "Alert", "Any Means Necessary", "Appraisal", "Autodidact", "Babysitter", "Balanced Landing", "Bardic Inspiration", "Beacon of Hope", "Better Together", "Better than New", "Bite the Bullet", "Blast Mine", "Blood Pact", "Blood Rush", "Boil Over", "Bond", "Boon: Circle of Healing", "Boon: Dark Theory", "Boon: Exponential", "Boon: Illumination", "Boon: Shadow Step", "Borrowed Time", "Botany Knowledge", "Breakdown", "Breakout", "Buckle Up", "Built to Last", "Calm Spirit", "Champion of Light", "Checkmate", "Chemical Trap", "Clairvoyance", "Corrective Action", "Counterforce", "Cut Loose", "Dark Sense", "Dead Hard", "Deception", "Decisive Strike", "Deliverance", "Desperate Measures", "Detective's Hunch", "Distortion", "Diversion", "Deja Vu", "Dramaturgy", "Empathy", "Fast Track", "Deadline", "Empowerment", "Inner Strength", "Fixated", "Flashbang", "Flip-Flop", "Fogwise", "For the People", "Friendly Competition", "Guardian", "Hardened", "Head On", "Hope", "Hyperfocus", "Inner Focus", "Invocation: Weaving Spiders", "Iron Will", "Kindred", "Leader", "Left Behind", "Lightweight", "Lithe", "Low Profile", "Lucky Break", "Lucky Star", "Made for This", "Mettle of Man", "Mirrored Illusion", "No Mither", "No One Left Behind", "Object of Obsession", "Off the Record", "Open-Handed", "Overcome", "Overzealous", "Parental Guidance", "Partnership", "Pharmacy", "Plunderer's Instinct", "Poised", "Potential Energy", "Power Struggle", "Premonition", "Projector", "Prove Thyself", "Quick & Quiet", "Quick Gambit", "Reactive Healing", "Reassurance", "Red Herring", "Renewal", "Repressed Alliance", "Residual Manifest", "Resilience", "Rookie Spirit", "Saboteur", "Scavenger", "Scene Partner", "Self-Care", "Self-Preservation", "Slippery Meat", "Small Game", "Smash Hit", "Sole Survivor", "Solidarity", "Soul Guard", "Spine Chill", "Sprint Burst", "Stake Out", "Static Cling", "Streetwise", "Strength in Shadows", "Stunner", "Swift Attack", "Tactician", "Technician", "Tenacity", "This Is Not Happening", "Troubleshooter", "Up the Ante", "Urban Evasion", "Unbreakable", "Vigil", "Visionary", "Wake Up!", "We're Gonna Live Forever", "Wicked", "Windows of Opportunity", "Wiretap", "Witness", "We'll Make It", "You're Next", "Eyes of Belmont", "Exultation", "Momentum", "Hardiness", "Finesse", "Specialist"
    ];

    let availablePerks = [...allPerks];
    let usedPerksHistory = [];
    let currentPerks = [];
    let streak = 0;
    let checkpoint = 0;

    const savedData = JSON.parse(localStorage.getItem('dbd_streak_v9'));
    if (savedData) {
        streak = savedData.streak;
        checkpoint = savedData.checkpoint;
        availablePerks = savedData.availablePerks;
        usedPerksHistory = savedData.usedPerksHistory || [];
    }

    function getPerkImgUrl(perkName) {
        // Logica migliorata per i nomi file delle icone
        let cleanName = perkName.replace(/ /g, "").replace(/:/g, "").replace(/'/g, "").replace(/&/g, "And");
        if(cleanName === "DejaVu") cleanName = "Deja_Vu";
        return `https://raw.githubusercontent.com/skandog/dbd-perk-icons/master/IconPerks_${cleanName}.png`;
    }

    function updateUI() {
        document.getElementById('streak').innerText = streak;
        document.getElementById('checkpoint').innerText = checkpoint;
        document.getElementById('remaining').innerText = availablePerks.length;
        localStorage.setItem('dbd_streak_v9', JSON.stringify({ streak, checkpoint, availablePerks, usedPerksHistory }));
    }

    function generatePerks() {
        currentPerks = [];
        let tempPool = [...availablePerks];
        let toRoll = Math.min(4, tempPool.length);
        for (let i = 0; i < toRoll; i++) {
            const idx = Math.floor(Math.random() * tempPool.length);
            currentPerks.push(tempPool.splice(idx, 1)[0]);
        }
        const display = document.getElementById('perk-display');
        display.innerHTML = '';
        currentPerks.forEach(p => {
            display.innerHTML += `
                <div class="perk-card">
                    <img src="${getPerkImgUrl(p)}" onerror="this.src='https://raw.githubusercontent.com/skandog/dbd-perk-icons/master/IconPerks_empty.png'">
                    <div class="perk-name">${p}</div>
                </div>`;
        });
        document.getElementById('btn-win').disabled = false;
        document.getElementById('btn-generate').disabled = true;
    }

    function handleWin() {
        usedPerksHistory.push({ atStreak: streak + 1, perks: [...currentPerks] });
        availablePerks = availablePerks.filter(p => !currentPerks.includes(p));
        streak++;
        if (streak >= 24) checkpoint = 24; else if (streak >= 12) checkpoint = 12;
        resetRound();
        updateUI();
    }

    function handleLoss() {
        if (confirm("Reset to checkpoint " + checkpoint + "?")) {
            const restore = usedPerksHistory.filter(h => h.atStreak > checkpoint).flatMap(h => h.perks);
            availablePerks = [...new Set([...availablePerks, ...restore])];
            usedPerksHistory = usedPerksHistory.filter(h => h.atStreak <= checkpoint);
            streak = checkpoint;
            resetRound();
            updateUI();
        }
    }

    function resetRound() {
        document.getElementById('perk-display').innerHTML = '<div class="perk-card">?</div>'.repeat(4);
        document.getElementById('btn-win').disabled = true;
        document.getElementById('btn-generate').disabled = false;
    }

    function fullReset() {
        if (confirm("Are you sure? This will wipe all progress!")) {
            localStorage.removeItem('dbd_streak_v9');
            location.reload();
        }
    }

    updateUI();
</script>
</body>
</html>
